plugins {
    id 'java-library'
    id 'maven-publish'
}

group = 'com.github.baihufox3210'
version = '1.2.0'

repositories {
    mavenCentral()
    
    maven { url 'https://jitpack.io' }
    maven { url 'https://frcmaven.wpi.edu/artifactory/release' }
    maven { url 'https://maven.ctr-electronics.com/release' }
    maven { url 'https://software-metadata.revrobotics.com/maven/release' }
}

dependencies {
    implementation 'edu.wpi.first.wpilibj:wpilibj-java:2026.+'
    implementation 'edu.wpi.first.wpiunits:wpiunits-java:2026.+'

    implementation 'com.ctre.phoenix6:wpiapi-java:26.+'
    implementation 'com.revrobotics.frc:REVLib-java:2026.+'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
}